services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ligafit
      POSTGRES_PASSWORD: ligafit
      POSTGRES_DB: ligafit
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ligafit -d ligafit"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    environment:
      PUERTO: ":8080"
      DB_DRIVER: postgres
      DB_DSN: "host=db user=ligafit password=ligafit dbname=ligafit port=5432 sslmode=disable TimeZone=America/Guayaquil"
      JWT_SECRETO: "ligafit-secret-key"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  dbdata: