services:
  db:
    image: postgres:16-alpine
    container_name: ligafit-postgres
    restart: always
    environment:
      POSTGRES_USER: ligafit
      POSTGRES_PASSWORD: ligafit
      POSTGRES_DB: ligafit
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ligafit-api:
    build: .
    container_name: ligafit-api
    restart: always
    environment:
      DB_DRIVER: postgres
      DB_DSN: host=db user=ligafit password=ligafit dbname=ligafit port=5432 sslmode=disable TimeZone=UTC
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  postgres_data: