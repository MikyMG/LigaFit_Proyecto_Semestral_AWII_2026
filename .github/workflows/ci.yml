name: CI

on:
  push:
  pull_request:

jobs:
  verificar:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'

      - run: go build ./...

      - run: go vet ./...

      - run: go test -v ./...

  docker:
    needs: verificar
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: docker build -t ligafit-api .