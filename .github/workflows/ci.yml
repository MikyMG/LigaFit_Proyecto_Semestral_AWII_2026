name: CI

on:
  push:
  pull_request:

jobs:
  verificar:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Instalar Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Compilar
        run: go build ./...

      - name: Analizar código
        run: go vet ./...

      - name: Ejecutar tests
        run: go test -v ./...